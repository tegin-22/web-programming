<!DOCTYPE html>
<html>
<style>
    .general{
        display: flex;
        justify-content: space-evenly
    }
    .normal{
        border-radius: 10px;
        border-color: blue;
        border: 10px;
        background-color: blue;
        width: 100px;
        height: 50px;
        color:white;
        display:flex;
        justify-content: center;
        align-items: center;
    }
    .outline{
        outline: solid;
        border-radius: 10px;
        border-color: blue;
        border: 10px;
        width: 100px;
        height: 50px;
        color:blue;
        display:flex;
        justify-content: center;
        align-items: center;
    }
    .succes{
        border-radius: 10px;
        border-color: green;
        border: 10px;
        background-color: green;
        width: 100px;
        height: 50px;
        color:white;
        display:flex;
        justify-content: center;
        align-items: center;
    }
    .danger{
        border-radius: 10px;
        border-color: red;
        border: 10px;
        background-color: red;
        width: 100px;
        height: 50px;
        color:white;
        display:flex;
        justify-content: center;
        align-items: center;
    }
</style>
<body>
    <div class="general">
    <div class="normal">
        Normal
    </div>
    <div class="outline">
        Outline 
    </div>
    <div class="succes">
        Ugur
    </div>
    <div class="danger">
        Tehluke
    </div>
    </div>

</body>


</html>
